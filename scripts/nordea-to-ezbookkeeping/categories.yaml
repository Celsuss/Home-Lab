# Nordea → ezbookkeeping category mapping rules
#
# HOW TO USE:
#   1. Run convert.py on your Nordea export once.
#   2. Check the output for rows with category "Uncategorized".
#   3. Look at the "Comment" column in out.csv — it shows the full Rubrik text.
#   4. Add rules below matching the keywords you see in those Rubrik values.
#   5. Re-run until everything is categorized to your satisfaction.
#
# FIELDS:
#   match_field: which Nordea field to search — "rubrik" (recommended), or "any"
#                For Nordea card purchases, the merchant name is embedded in Rubrik,
#                e.g. "Kortköp STEAMGAMES.COM" or "Reservation Kortköp ICA SUPERMARKET".
#   pattern:     case-insensitive substring to match (or a regex if regex: true)
#   regex:       optional, default false — set to true to use Python regex syntax
#
# Rules are evaluated top-to-bottom; the FIRST match wins.

account_name: "Nordea Checking"   # must match the account name you have in ezbookkeeping

default_category: "Uncategorized"
default_sub_category: ""

rules:
  # --- Income ---
  - category: "Income"
    sub_category: "Salary"
    match_field: "rubrik"
    pattern: "Lön"

  - category: "Income"
    sub_category: "Transfer In"
    match_field: "rubrik"
    pattern: "Swish"
    # Remove or narrow this rule if you also send money via Swish (expenses)

