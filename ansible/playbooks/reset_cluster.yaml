---
- name: Reset K3s on agent nodes
  hosts: k3s_agents
  become: yes
  tasks:
    - name: Run k3s-agent-uninstall.sh if present
      ansible.builtin.command: /usr/local/bin/k3s-agent-uninstall.sh
      args:
        removes: /usr/local/bin/k3s-agent-uninstall.sh

- name: Reset K3s on server nodes
  hosts: k3s_servers
  become: yes
  tasks:
    - name: Run k3s-uninstall.sh if present
      ansible.builtin.command: /usr/local/bin/k3s-uninstall.sh
      args:
        removes: /usr/local/bin/k3s-uninstall.sh
