---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.name }}-data-pvc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "navidrome.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.data.storage }}
  storageClassName: {{ .Values.persistence.storageClass }}
