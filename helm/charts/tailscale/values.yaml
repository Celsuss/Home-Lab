---
namespace: tailscale

# Configuration for the subnet router Connector resource.
subnetRouter:
  enabled: true
  # The hostname for the subnet router device on your tailnet.
  hostname: "lord-k3s-homelab"
  # The list of CIDR ranges to advertise. Defaults are for K3s.
  routes:
    - "10.42.0.0/16"
    - "10.43.0.0/16"

tailscale-operator:
  oauth:
    createSecret: false

# Vault Secrets Operator configuration.
vault:
  secretPath: homelab/tailscale
  secretName: operator-oauth
