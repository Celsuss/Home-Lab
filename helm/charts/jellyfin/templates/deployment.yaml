---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      containers:
      - name: {{ .Values.name }}
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
        securityContext:
          runAsNonRoot: false
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 5
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        volumeMounts:
        - name: config
          mountPath: /config
        - name: movies
          mountPath: /media/movies
        - name: tvshows
          mountPath: /media/tvshows
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: {{ .Values.name }}-config-pvc
      - name: movies
        hostPath:
          path: {{ .Values.persistence.media.movies.hostPath }}
          type: Directory
      - name: tvshows
        hostPath:
          path: {{ .Values.persistence.media.tvshows.hostPath }}
          type: Directory
