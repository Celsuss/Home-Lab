    rbac:
      policy.csv: |
        g, sso_users, role:admin
      policy.default: role:readonly

  server:
    replicas: 1
    extraArgs:
      - --insecure
      - --repo-server-timeout-seconds=240

    ingress:
      enabled: true
      ingressClassName: traefik
      hostname: argocd.homelab.local
      servicePortName: http
      annotations:
        traefik.ingress.kubernetes.io/service.scheme: h2c
        cert-manager.io/cluster-issuer: homelab-ca
      tls: true

    resources:
      requests:
        cpu: 50m
        memory: 128Mi

  repoServer:
    replicas: 1
    # -- Use the custom image that includes the sops binary.
    image:

      # repository: ghcr.io/celsuss/argo-cd-repo-server-sops
      # tag: "1.0.12" # "1.0.10"

      repository: quay.io/argoproj/argocd
      tag: "v3.1.4"
      pullPolicy: IfNotPresent


    # env:
    #   - name: HELM_PLUGINS
    #     value: /home/argocd/.local/share/helm/plugins
    #   - name: HELM_SECRETS_QUIET
    #     value: "true"

    volumes:
      - name: sops-age-key
        secret:
          secretName: sops-age-key
          defaultMode: 0400
    volumeMounts:
      - name: sops-age-key
        mountPath: /home/argocd/.config/sops/age/
        readOnly: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi

  controller:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  applicationSet:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
  redis:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
