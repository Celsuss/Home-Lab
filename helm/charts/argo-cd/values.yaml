---
# https://github.com/argoproj/argo-helm/blob/main/charts/argo-cd/values.yaml

vault:
  secretPath: argocd/oidc
  secretName: argocd-oidc-secret

argo-cd:
  global:
    image:
      # repository: ghcr.io/celsuss/argo-cd-repo-server-sops
      # tag: "1.0.10"
      repository: quay.io/argoproj/argocd
      tag: "v3.1.4"
      pullPolicy: IfNotPresent

    domain: argocd.homelab.local

    logging:
      # -- Set the global logging format. Either: `text` or `json`
      format: text
      # -- Set the global logging level. One of: `debug`, `info`, `warn` or `error`
      level: info

  dex:
    enabled: false

  configs:
    params:
      server.insecure: "true"

    cm:
      url: https://argocd.homelab.local
      oidc.config: |
        name: Kanidm
        issuer: https://kanidm.homelab.local/oauth2/openid/argocd
        clientID: argocd
        clientSecret: $argocd-oidc-secret:client-secret
        requestedScopes:
          - openid
          - profile
          - email
          - groups

    tls:
