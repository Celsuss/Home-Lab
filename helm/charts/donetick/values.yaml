---
replicaCount: 1
namespace: utils

image:
  repository: donetick/donetick
  pullPolicy: IfNotPresent
  tag: "v0.1.60"

env:
  - name: DT_ENV
    value: selfhosted
  - name: DT_SQLITE_PATH
    value: /donetick-data/donetick.db

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 2021

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
  host: donetick.homelab.local
  tls:
    - secretName: donetick-tls
      hosts:
        - donetick.homelab.local

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

jwt:
  secret: ""

persistence:
  storageClassName: "local-path"
  dataStorage: 2Gi
  configStorage: 1Gi

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: data
    mountPath: "/donetick-data"
  - name: config
    mountPath: "/config"
    readOnly: true

tailscale:
  enabled: false
