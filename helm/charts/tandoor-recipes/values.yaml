---
namespace: tandoor

image:
  repository: vabene1111/recipes
  tag: "1.5.21"
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "recipes"

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: tandoor
  user: tandoor
  persistence:
    storageClassName: local-path
    storage: 5Gi

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
  host: tandoor.homelab.local
  tls:
    - secretName: tandoor-tls
      hosts:
        - tandoor.homelab.local

persistence:
  storageClassName: local-path
  mediaStorage: 2Gi

vault:
  secretPath: homelab/tandoor-recipes
  secretName: tandoor-recipes-secrets

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
