---
namespace: tandoor

image:
  repository: vabene1111/recipes
  tag: "2.5.3"
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "recipes"

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  database: tandoor
  user: tandoor
  persistence:
    storageClassName: local-path
    storage: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  livenessProbe:
    exec:
      command: ["pg_isready", "-U", "tandoor"]
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    exec:
      command: ["pg_isready", "-U", "tandoor"]
    initialDelaySeconds: 5
    periodSeconds: 10

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
  host: tandoor.homelab.local
  tls:
    - secretName: tandoor-tls
      hosts:
        - tandoor.homelab.local

persistence:
  storageClassName: local-path
  mediaStorage: 2Gi

vault:
  secretPath: homelab/tandoor-recipes
  secretName: tandoor-recipes-secrets

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30

nodeSelector: {}

tolerations: []

affinity: {}

tailscale:
  enabled: true
