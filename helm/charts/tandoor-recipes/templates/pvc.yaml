---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tandoor-recipes.fullname" . }}-media
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tandoor-recipes.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.persistence.mediaStorage }}
