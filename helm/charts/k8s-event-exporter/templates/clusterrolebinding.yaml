---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-event-exporter.fullname" . }}
  labels:
    {{- include "k8s-event-exporter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-event-exporter.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-event-exporter.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
