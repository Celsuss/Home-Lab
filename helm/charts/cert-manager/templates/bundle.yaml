---
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: homelab-ca-bundle
  namespace: cert-manager
spec:
  sources:
    - useDefaultCAs: true
    - secret:
        name: homelab-ca-tls
        key: tls.crt
  target:
    configMap:
      key: ca-certificates.crt
    namespaceSelector: {}
