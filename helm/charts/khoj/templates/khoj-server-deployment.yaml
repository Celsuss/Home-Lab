---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "khoj.fullname" . }}-server
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "khoj.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{.Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "khoj.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "khoj.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: khoj
          image: "{{.Values.khoj.image.repository }}:{{.Values.khoj.image.tag }}"
          imagePullPolicy: {{.Values.khoj.image.pullPolicy }}
          args:
            - "--host=0.0.0.0"
            - "--port={{ .Values.khoj.service.port }}"
            - "-vv"
            - "--anonymous-mode"
            - "--non-interactive"
          ports:
            - name: http
              containerPort: {{.Values.khoj.service.port }}
              protocol: TCP
          env:
            - name: KHOJ_DOMAIN
              value: {{.Values.khoj.config.KHOJ_DOMAIN | quote }}
            - name: KHOJ_NO_HTTPS
              value: {{.Values.khoj.config.KHOJ_NO_HTTPS | quote }}
            - name: OPENAI_BASE_URL
              value: {{.Values.khoj.config.OPENAI_BASE_URL | quote }}
            - name: POSTGRES_HOST
              value: "{{ include "khoj.fullname" . }}-postgres"
            - name: REDIS_HOST
              value: "{{ include "khoj.fullname" . }}-redis"
            - name: SEARXNG_HOST
              value: "http://{{ include "khoj.fullname" . }}-searxng:{{.Values.searxng.service.port }}"
            - name: KHOJ_CODE_EXECUTION_HOST
              value: "http://{{ include "khoj.fullname" . }}-terrarium:{{.Values.terrarium.service.port }}"
            - name: KHOJ_ADMIN_EMAIL
              value: {{ .Values.khoj.config.KHOJ_ADMIN_EMAIL }}
            - name: KHOJ_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.secretName }}
                  key: KHOJ_ADMIN_PASSWORD
            - name: KHOJ_DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.secretName }}
                  key: KHOJ_DJANGO_SECRET_KEY
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.secretName }}
                  key: POSTGRES_PASSWORD

          {{- if .Values.khoj.gpu.enabled }}
          resources:
            limits:
              nvidia.com/gpu: {{.Values.khoj.gpu.count }}
          {{- else if .Values.khoj.resources }}
          resources:
            {{- toYaml .Values.khoj.resources | nindent 12 }}
          {{- end }}
          {{- with .Values.khoj.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.khoj.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.gitSync.enabled }}
            - name: git-sync-repo
              mountPath: {{ .Values.gitSync.mountPath }}
              subPath: current
              readOnly: true
            {{- end }}
        {{- if .Values.gitSync.enabled }}
        - name: git-sync
          image: "{{ .Values.gitSync.image.repository }}:{{ .Values.gitSync.image.tag }}"
          imagePullPolicy: {{ .Values.gitSync.image.pullPolicy }}
          env:
            - name: GITSYNC_REPO
              value: {{ .Values.gitSync.repo | quote }}
            - name: GITSYNC_REF
              value: {{ .Values.gitSync.branch | quote }}
            - name: GITSYNC_ROOT
              value: "/git"
            - name: GITSYNC_LINK
              value: "current"
            - name: GITSYNC_PERIOD
              value: {{ .Values.gitSync.period | quote }}
            - name: GITSYNC_USERNAME
              value: "khoj-sync"
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vault.secretName }}
                  key: FORGEJO_ACCESS_TOKEN
          volumeMounts:
            - name: git-sync-repo
              mountPath: /git
            - name: git-sync-tmp
              mountPath: /tmp
          {{- with .Values.gitSync.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
        {{- end }}
      volumes:
        - name: data
        {{- if.Values.khoj.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "khoj.fullname" . }}-server-pvc
        {{- else }}
          emptyDir: {}
        {{- end }}
        {{- if .Values.gitSync.enabled }}
        - name: git-sync-repo
          emptyDir: {}
        - name: git-sync-tmp
          emptyDir: {}
        {{- end }}
