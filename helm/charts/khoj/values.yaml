---
namespace: ai-workloads
replicaCount: 1

khoj:
  image:
    repository: ghcr.io/khoj-ai/khoj
    pullPolicy: IfNotPresent
    tag: "2.0.0-beta.15"

  service:
    type: ClusterIP
    port: 8000

  gpu:
    enabled: false
    count: 1

  persistence:
    enabled: true
    storageClassName: ""
    size: 20Gi

  config:
    KHOJ_DOMAIN: "khoj.homelab.local"
    KHOJ_NO_HTTPS: "True"
    OPENAI_BASE_URL: "http://ollama.ai-workloads.svc.cluster.local:11434/v1/"
    KHOJ_ADMIN_EMAIL: "jenslorden@proton.me"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  livenessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
  readinessProbe:
    httpGet:
      path: /api/health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5

# PostgreSQL with PostGIS Configuration
postgres:
  image:
    repository: pgvector/pgvector
    pullPolicy: IfNotPresent
    tag: "pg16"

  service:
    port: 5432

  user: "khoj"
  database: "khoj_production"

  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    exec:
      command: ["pg_isready", "-U", "khoj"]
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    exec:
      command: ["pg_isready", "-U", "khoj"]
    initialDelaySeconds: 5
    periodSeconds: 10

redis:
  image:
    repository: redis
    pullPolicy: IfNotPresent
    tag: "7.2.5-alpine"

  service:
    port: 6379

  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  livenessProbe:
    exec:
      command: ["redis-cli", "ping"]
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    exec:
      command: ["redis-cli", "ping"]
    initialDelaySeconds: 5
    periodSeconds: 10

searxng:
  image:
    repository: searxng/searxng
    pullPolicy: IfNotPresent
    tag: "2026.3.18-3810dc9d1"

  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10

# Terrarium Code Sandbox Configuration
terrarium:
  image:
    # Pinned by digest since upstream only publishes :latest
    repository: ghcr.io/khoj-ai/terrarium
    pullPolicy: IfNotPresent
    digest: "sha256:caf9356305daf9f7f4e4a63ef1ce3a72dc2c0190cb8fdfa4e0e837d2298f19ce"
    tag: ""

  service:
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5

ingress:
  enabled: true
  className: traefik
  host: "khoj.homelab.local"
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
  tls:
    - secretName: khoj-tls
      hosts:
        - khoj.homelab.local

vault:
  secretPath: homelab/khoj
  secretName: khoj-secrets

tailscale:
  enabled: true

gitSync:
  enabled: true
  image:
    repository: registry.k8s.io/git-sync/git-sync
    tag: "v4.4.0"
    pullPolicy: IfNotPresent
  repo: "http://forgejo-http.forgejo.svc.cluster.local:3000/celsuss/second-brain.git"
  branch: "main"
  period: "300s"
  mountPath: "/data/org"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
