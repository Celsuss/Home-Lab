---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: machine-learning
spec:
  type: ClusterIP
  selector:
    {{- include "immich.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: machine-learning
  ports:
    - port: {{ .Values.ml.service.port }}
      targetPort: http
      protocol: TCP
      name: http
