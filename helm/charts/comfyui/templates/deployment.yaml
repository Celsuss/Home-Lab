---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "comfyui.fullname" . }}
  labels:
    {{- include "comfyui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # ComfyUI holds a RWO PVC; never run two pods against it at once.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "comfyui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "comfyui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "comfyui.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      {{- if .Values.persistence.enabled }}
      # local-path PVC dirs are created root-owned; fsGroup fixes the group but
      # not the owner UID. The image validates /basedir and /comfy/mnt as "mount"
      # dirs requiring exact 1000:1000 ownership and refuses to chown them itself,
      # so fix ownership here before the main container's entrypoint validates it.
      initContainers:
        - name: fix-permissions
          image: busybox:1.37
          command: ["sh", "-c", "mkdir -p /data/basedir /data/run && chown 1000:1000 /data/basedir /data/run"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: comfyui-data
              mountPath: /data
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "comfyui.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          # First boot bootstraps a venv + installs torch, which can take several
          # minutes — keep the startup window generous before liveness kicks in.
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 15
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- with .Values.resources }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: comfyui-data
              mountPath: {{ .Values.persistence.baseDir }}
              subPath: basedir
            - name: comfyui-data
              mountPath: {{ .Values.persistence.runDir }}
              subPath: run
      volumes:
        - name: comfyui-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "comfyui.fullname" . }}-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
