---
replicaCount: 1

namespace: ai-workloads

image:
  # Actively maintained NVIDIA/CUDA ComfyUI image (entrypoint manages the
  # comfy user via WANTED_UID/WANTED_GID and bootstraps a venv on first run).
  repository: mmartial/comfyui-nvidia-docker
  pullPolicy: IfNotPresent
  # Pin to a dated build, not bare "latest" — a "latest" entrypoint change is
  # what broke the pod (it now starts as the comfytoo user, not root).
  tag: "ubuntu24_cuda12.9-20260605"

serviceAccount:
  create: true
  annotations: {}
  name: ""

env:
  # Map the in-container "comfy" user to the fsGroup below so the mounted
  # volumes are writable.
  - name: WANTED_UID
    value: "1000"
  - name: WANTED_GID
    value: "1000"
  # ComfyUI-Manager security policy (normal = allow installing custom nodes).
  - name: SECURITY_LEVEL
    value: "normal"

podSecurityContext:
  fsGroup: 1000

# The image starts as its built-in "comfytoo" user (UID/GID 1025), which uses
# sudo to remap the "comfy" user to WANTED_UID/WANTED_GID and re-execs as it.
# Starting as root breaks this flow, so run as comfytoo and let it drop down.
securityContext:
  runAsNonRoot: true
  runAsUser: 1025
  runAsGroup: 1025

service:
  type: ClusterIP
  port: 8188
  targetPort: 8188

ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
  host: comfyui.homelab.local
  tls:
    - secretName: comfyui-tls
      hosts:
        - comfyui.homelab.local

resources:
  limits:
    nvidia.com/gpu: 1   # one time-sliced GPU share
    memory: "16Gi"
    cpu: "4"
  requests:
    nvidia.com/gpu: 1
    memory: "4Gi"
    cpu: "1"

gpu:
  enabled: true
  resourceName: "nvidia.com/gpu"
  count: 1

persistence:
  enabled: true
  storageClass: ""          # K3s default (local-path)
  accessMode: ReadWriteOnce
  size: 80Gi
  # The image keeps user data (models, custom_nodes, input/output, workflows)
  # in /basedir and the venv/source/HF cache in /comfy/mnt. Both are persisted
  # via subPaths on a single PVC so restarts don't re-download torch/models.
  baseDir: /basedir
  runDir: /comfy/mnt

tolerations: []

affinity: {}

nodeSelector: {}

runtimeClassName: "nvidia"

tailscale:
  enabled: true
  serviceName: comfyui
