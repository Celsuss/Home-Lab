---
k8s-gateway:
  domain: homelab.local
  watchedResources:
    - Ingress
  # Enable fallthrough so queries not matched by k8s_gateway (e.g. Kanidm
  # which uses IngressRouteTCP) fall through to the file plugin below.
  fallthrough:
    enabled: true
  # Static DNS entry for Kanidm (uses IngressRouteTCP, not standard Ingress)
  # so k8s-gateway won't auto-discover it. We use a zone file with the
  # Traefik LoadBalancer IP (192.168.0.142).
  zoneFiles:
    - filename: kanidm.db
      domains: kanidm.homelab.local
      contents: |
        kanidm.homelab.local.   IN  SOA sns.dns.icann.org. noc.dns.icann.org. 2015082541 7200 3600 1209600 3600
        kanidm.homelab.local.   IN  A   192.168.0.142
