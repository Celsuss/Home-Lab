---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-unseal
  namespace: vault
spec:
  # Run every minute to check the seal status
  schedule: "*/1 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # A dedicated service account with RBAC is preferred,
          # but 'default' may work depending on K3s setup.
          serviceAccountName: default
          containers:
          - name: vault-unsealer
            # Use the same Vault image version as the server
            image: hashicorp/vault:1.20.4
            command:
              - /bin/sh
              - -c
              - |
                export VAULT_ADDR="http://vault-server.vault.svc.cluster.local:8200"

                # Retry up to 5 times with 2s delay to handle transient DNS failures
                for i in 1 2 3 4 5; do
                  STATUS_OUTPUT=$(vault status 2>&1) && break
                  echo "Attempt $i: Failed to reach Vault, retrying in 2s..."
                  sleep 2
                done

                if echo "$STATUS_OUTPUT" | grep -q "Sealed[[:space:]]*true"; then
                  echo "Vault is sealed. Attempting unseal..."
                  vault operator unseal "$VAULT_UNSEAL_KEY_1"
                elif echo "$STATUS_OUTPUT" | grep -q "Sealed[[:space:]]*false"; then
                  echo "Vault is already unsealed."
                else
                  echo "ERROR: Could not determine seal status:"
                  echo "$STATUS_OUTPUT"
                  exit 1
                fi
            env:
              # Mount the unseal key from our K8s secret
              - name: VAULT_UNSEAL_KEY_1
                valueFrom:
                  secretKeyRef:
                    name: vault-unseal-keys
                    key: key1
