---
namespace: forgejo

forgejo:
  fullnameOverride: forgejo
  gitea:
    admin:
      existingSecret: forgejo-admin-secret
    config:
      database:
        DB_TYPE: postgres
        HOST: forgejo-postgresql.forgejo.svc.cluster.local:5432
        NAME: forgejo
        USER: forgejo
      server:
        DOMAIN: forgejo.homelab.local
        ROOT_URL: https://forgejo.homelab.local
      webhook:
        ALLOWED_HOST_LIST: external,loopback
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: forgejo.homelab.local
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: forgejo-tls
        hosts:
          - forgejo.homelab.local
    annotations:
      cert-manager.io/cluster-issuer: homelab-ca
  postgresql:
    enabled: true
    auth:
      existingSecret: forgejo-admin-secret
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: postgres-password
    primary:
      persistence:
        storageClass: local-path

tailscale:
  enabled: true
  serviceName: forgejo-http
  servicePort: 3000

vault:
  secretPath: homelab/forgejo
  secretName: forgejo-admin-secret
