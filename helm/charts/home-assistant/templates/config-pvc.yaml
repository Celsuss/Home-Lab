---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "home-assistant.fullname" . }}-config-pvc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "home-assistant.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.configStorage }}
  storageClassName: {{ .Values.persistence.storageClassName }}
