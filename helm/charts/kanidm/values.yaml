namespace: kanidm

image:
  repository: kanidm/server
  tag: "latest"       # Pin to a specific version e.g. "1.4.2" in production
  pullPolicy: IfNotPresent

replicaCount: 1

kanidm:
  domain: kanidm.homelab.local
  origin: https://kanidm.homelab.local
  logLevel: info

service:
  httpsPort: 8443
  ldapPort: 3636

ingress:
  enabled: true
  className: traefik
  host: kanidm.homelab.local

persistence:
  storageClassName: local-path
  storage: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

vault:
  secretPath: kanidm/idm_admin
  secretName: kanidm-idm-admin

provisioning:
  enabled: true
  image:
    repository: kanidm/tools
    tag: latest
    pullPolicy: IfNotPresent
  users:
    - name: celsus
      displayName: "Celsus"
      groups:
        - idm_admins
        - sso_users
  groups:
    - idm_admins
    - sso_users
