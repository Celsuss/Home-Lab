{{- if .Values.provisioning.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kanidm.fullname" . }}-provision-users
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kanidm.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "kanidm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: provisioning
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: idm-admin-secret
          secret:
            secretName: {{ .Values.vault.secretName }}
            items:
              - key: password
                path: password
            optional: true
      initContainers:
        - name: wait-for-secret
          image: busybox:1.36
          volumeMounts:
            - name: idm-admin-secret
              mountPath: /secrets
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              until [ -f /secrets/password ]; do
                echo "Waiting for {{ .Values.vault.secretName }} secret..."
                sleep 5
              done
              echo "Secret is available."
      containers:
        - name: provision
          image: "{{ .Values.provisioning.image.repository }}:{{ .Values.provisioning.image.tag }}"
          imagePullPolicy: {{ .Values.provisioning.image.pullPolicy }}
          env:
            - name: KANIDM_URL
              value: "https://{{ include "kanidm.fullname" . }}.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.service.httpsPort }}"
          volumeMounts:
            - name: idm-admin-secret
              mountPath: /secrets
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              set -e

              mkdir -p ~/.config/kanidm
              printf 'uri = "%s"\nverify_ca = false\n' "$KANIDM_URL" > ~/.config/kanidm/config

              IDM_ADMIN_PASSWORD=$(cat /secrets/password)
              echo "Authenticating as idm_admin..."
              echo "$IDM_ADMIN_PASSWORD" | kanidm login -D idm_admin

              {{- range .Values.provisioning.groups }}
              echo "Ensuring group '{{ . }}' exists..."
              if kanidm group get {{ . }} >/dev/null 2>&1; then
                echo "Group '{{ . }}' already exists."
              else
                kanidm group create {{ . }}
                echo "Group '{{ . }}' created."
              fi
              {{- end }}

              {{- range .Values.provisioning.users }}
              {{- $user := .name }}
              echo "Ensuring user '{{ $user }}' exists..."
              if kanidm person get {{ $user }} >/dev/null 2>&1; then
                echo "User '{{ $user }}' already exists."
              else
                kanidm person create {{ $user }} "{{ .displayName }}"
                echo "User '{{ $user }}' created."
              fi

              {{- range .groups }}
              echo "Adding '{{ $user }}' to group '{{ . }}'..."
              kanidm group add-members {{ . }} {{ $user }} || true
              {{- end }}
              {{- end }}

              echo "Provisioning complete."
{{- end }}
