---
replicaCount: 1
namespace: ai-workloads
name: open-webui

image:
  repository: ghcr.io/open-webui/open-webui
  pullPolicy: IfNotPresent
  tag: "0.8.10"

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

env:
  - name: OLLAMA_BASE_URL
    value: "http://ollama.ai-workloads.svc.cluster.local:11434"
  - name: WEBUI_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: open-webui-secret
        key: webui-secret-key
  # --- Web Search Configuration (SearXNG) ---
  - name: ENABLE_RAG_WEB_SEARCH
    value: "True"
  - name: RAG_WEB_SEARCH_ENGINE
    value: "searxng"
  - name: SEARXNG_QUERY_URL
    value: "http://searxng.ai-workloads.svc.cluster.local:8080/search?q=<query>"
  - name: RAG_WEB_SEARCH_RESULT_COUNT
    value: "5"
  - name: ENABLE_SEARCH_QUERY
    value: "True"

vault:
  secretPath: homelab/open-webui
  secretName: open-webui-secret

service:
  type: ClusterIP
  port: 8080

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: true
  className: traefik
  host: open-webui.homelab.local
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
  tls:
    - secretName: open-webui-tls
      hosts:
        - open-webui.homelab.local

persistence:
  storage: 3Gi

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

tailscale:
  enabled: true
  serviceName: open-webui
